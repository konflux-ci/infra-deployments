---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/konflux-ci/konflux-ci/dependencies/tekton-config?ref=409c193f818dc1ce537b3f0fc207c0530a937474

patches:
  - patch: |
      - op: remove
        path: /spec/chain/options
    target:
      kind: TektonConfig
      name: config
  - patch: |
      - op: remove
        path: /spec/pipeline/options
    target:
      kind: TektonConfig
      name: config
